# .github/workflows/ci-cd.yml

name: Build and Push to Docker Hub

# Триггер: Запускать при пуше в ветку main
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pythonproject3
      TAG: latest-${{ github.sha }}

    steps:
      # Шаг 1: Проверить код из репозитория
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Шаг 2: Логин в Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Шаг 3: Собрать и запушить образ за один шаг
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ env.TAG }}