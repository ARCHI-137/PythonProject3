# .github/workflows/ci-cd.yml

name: Build and Push to Docker Hub

# Триггер: Запускать при пуше в ветку main
on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    # Имя машины, на которой будем собирать (стандартная ubuntu)
    runs-on: ubuntu-latest

    env:
      # Собираем имя образа из твоего логина и имени репозитория
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/pythonproject3
      # Используем SHA коммита как тег для точной версионировки
      TAG: latest-${{ github.sha }}

    steps:
      # Шаг 1: Проверить код из репозитория
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Шаг 2: Настроить Docker для входа в реестр
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: index.docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Шаг 2.5: ВРЕМЕННЫЙ диагностический шаг
      - name: Debug push test
        run: |
          docker pull hello-world
          docker tag hello-world ${{ secrets.DOCKERHUB_USERNAME }}/pythonproject3:debug
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pythonproject3:debug

      # Шаг 3: Собрать Docker-образ
      - name: Build Docker image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ env.TAG }}

      # Шаг 4: Отправить собранный образ в Docker Hub
      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ env.TAG }}
          push: true